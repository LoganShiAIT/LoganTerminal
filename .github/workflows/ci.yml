name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        # The app targets macOS + Windows (build.yml matches). If Linux ever
        # becomes a target, re-add ubuntu-latest here plus an apt-get step for
        # the Tauri system deps (libwebkit2gtk-4.1-dev libayatana-appindicator3-dev
        # librsvg2-dev libxdo-dev) — without them the tauri crate cannot compile,
        # which kept this workflow permanently red until 2026-07-05.
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: npm ci
        run: npm ci

      - name: npm test
        run: npm test

      - name: npm run build
        run: npm run build
